<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se Já</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
        <div class="container">
            <div class="quadrado"></div>
            <div class="form-box">
                <form id="cadastroForm" class="form">
                    <h2>Crie sua conta</h2>
                    <br>
                    <p class="subtitle">Preencha os dados abaixo</p>
                    <div class="input-group"><br>
                        <label for="cadNome">Nome completo</label><br>
                        <input type="text" id="cadNome" placeholder="Seu nome" required oninput="toggleButton()">
                    </div>

                    <div class="input-group"><br>
                        <label for="cadEmail">E-mail</label><br>
                        <input type="email" id="cadEmail" placeholder="seu@email.com" required oninput="toggleButton()">
                    </div>

                    <div class="input-group"><br>
                        <label for="cadSenha">Senha</label><br>
                        <input type="password" id="cadSenha" placeholder="Mínimo 6 caracteres" required oninput="toggleButton()">
                    </div>

                    <div class="input-group"><br>
                        <label for="cadConfirm">Confirmar senha</label><br>
                        <input type="password" id="cadConfirm" placeholder="Repita a senha" required oninput="toggleButton()">
                    </div><br>

                    <div class="checkbox-termos">
                            <input
                                type="checkbox"
                                id="termos"
                                name="termos"
                                onchange="toggleButton()"
                            >

                            <label for="termos">
                                Li e concordo com os
                                <a href="../termos/index.html" target="_blank">
                                    Termos de Uso
                                </a>
                                e com a
                                <a href="../privacidade/index.html" target="_blank">
                                    Política de Privacidade
                                </a>.
                            </label>
                    </div>

                    <button type="submit" class="btn" id="btn" disabled>Cadastrar</button>

                    <p class="switch">
                        Já tem conta? 
                        <a href="../login/index.html">Entrar</a>
                    </p>
                </form>

            </div>
        </div>

    <script>
        function toggleButton() {
    const nome = document.getElementById("cadNome").value;
    const email = document.querySelector("#cadEmail").value;
    const senha = document.querySelector("#cadSenha").value;
    const confirmarSenha = document.querySelector("#cadConfirm").value;
    const termos = document.querySelector("#termos");

    if (termos.checked && nome !== "" && email !== "" && senha !== "" && confirmarSenha !== "" && senha === confirmarSenha) {
        document.querySelector("#btn").disabled = false;
        return;
    }
    document.querySelector("#btn").disabled = true;
}

const form = document.querySelector("#cadastroForm");
if (form) {
    form.addEventListener("submit", function(event) {
        event.preventDefault(); 
        
        const nome = document.getElementById("cadNome").value;
        const email = document.querySelector("#cadEmail").value;
        const senha = document.querySelector("#cadSenha").value;

        fetch("http://127.0.0.1:8000/cadastro/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: nome,
                email: email,
                senha: senha
            })
        })
        .then(response => {
            if (response.ok) {
                localStorage.setItem("nome", nome);
                window.location.href = "../login/index.html";
            } else {
                alert("Erro no cadastro. O e-mail já pode estar cadastrado no banco.");
            }
        })
        .catch(error => {
            console.error("Erro crítico de conexão:", error);
            alert("O dado não chegou no banco. O terminal do VS Code está ligado?");
        });
    });
}
    </script>

</body>
</html>
