<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Cadastro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <div class="c1">
                <div class="c2"></div>
            </div>
            <!-- FORMULÁRIO DE LOGIN -->
            <form id="loginForm" class="form active">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitle">Faça login na sua conta</p>

                <div class="input-group"><br>
                    <label for="Email">E-mail</label><br>
                    <input type="email" id="Email" placeholder="seu@email.com" required onchange="mudar()">
                </div>

                <div class="input-group"><br>
                    <label for="Senha">Senha</label><br>
                    <input type="password" id="Senha" placeholder="••••••••" onchange="mudar()">
                </div>

                <div class="options">
                    <label class="checkbox">
                        <input type="checkbox"
                        id="lembrar"
                        onchange="mudar()">Lembrar de mim
                    </label>
                    <a href="#">Esqueci a senha</a>
                </div>

                <button type="submit" href="../index.html" class="btn" id="btn" disabled>Entrar</button>

                <p class="switch">
                    Não tem conta? 
                    <a href="login/login.html" onclick="trocarForm('cadastro')">Cadastre-se</a>
                </p>
            </form>

        </div>
    </div>
    <script src="login.js"></script>

</body>
</html>
