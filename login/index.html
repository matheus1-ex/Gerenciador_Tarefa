<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador | Entrar</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <!-- FORMULÁRIO DE LOGIN -->
            <form id="loginForm" class="form active">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitle">Faça login na sua conta</p>

                <div class="input-group"><br>
                    <label for="Email">E-mail</label><br>
                    <input type="email" id="Email" placeholder="seu@email.com" required onchange="mudar()">
                </div>

                <div class="input-group"><br>
                    <label for="Senha">Senha</label><br>
                    <input type="password" id="Senha" placeholder="••••••••" onchange="mudar()">
                </div>

                <div class="options">
                    <label class="checkbox">
                        <input type="checkbox"
                        id="lembrar"
                        onchange="mudar()">Lembrar de mim
                    </label>
                    <a href="#">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn" id="btn" disabled>Entrar</button>

                <p class="switch">
                    Não tem conta? <br>
                    <a href="https://matheus1-ex.github.io/Gerenciador_Tarefa/cadastro/index.html">Cadastre-se</a>
                </p>
            </form>

        </div>
    </div>
    <script>
        function mudar(){
    const email = document.querySelector("#Email").value;
    const senha = document.querySelector("#Senha").value;

    if (email !== "" && senha !== ""){
        document.querySelector("#btn").disabled = false;
        return;
    }
    document.querySelector("#btn").disabled = true;
}

const loginForm = document.querySelector("#loginForm");
if (loginForm) {
    loginForm.addEventListener("submit", function(event){
        event.preventDefault();

        const email = document.querySelector("#Email").value;
        const senha = document.querySelector("#Senha").value;

        fetch("http://127.0.0.1:8000/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                senha: senha
            })
        })
        .then(response => {
            if (response.ok) {
                return response.json();
            }
            throw new Error("Credenciais inválidas");
        })
        .then(data => {
            localStorage.setItem("nome", data.nome);
            window.location.href = "https://matheus1-ex.github.io/Gerenciador_Tarefa/Principal/index.html";
        })
        .catch(error => {
            alert("E-mail ou senha incorretos!");
        });
    });
}
    </script>

</body>
</html>
