<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/stylo.css">
    <title>Gerenciador de Tarefas</title>
</head>

<body>
    <header class="cabeçalho">
        <div>
            <div class="perfil">
                <h4>Olá <br><span id="usuario"></span></h4>
                <button type="button" onclick="siteOficial()" class="btn2" id="btn2">sair</button>
            </div>
            <h1>Gerenciador de Tarefas v2.0</h1>
        </div>
        <div class="pesquisar">
            <input type="search" oninput="pesquisar()" id="pesquisar" placeholder="Pesquise suas tarefas...">
            <button onclick="pesquisar()" class="buscar">buscar</button>
            <button onclick="mostrarTodos()" class="mostrar">mostrar todos</button>
        </div>
    </header>

    <div class="conteudo">
        <div class="painelAtividades">
            <form id="FormTarefa">
                <label for="titulo">Sua Tarefa (Título)</label><br>
                <input type="text" class="arquivo" required id="titulo" placeholder="Digite o título da tarefa"
                    name="titulo"><br>

                <label for="arquivo">Selecione o arquivo para anexar (Opcional)</label><br>
                <input type="file" class="arquivo" id="arquivo" name="arquivo"><br>

                <label for="descricao">Digite a descrição da sua tarefa</label><br>
                <textarea class="descricao" id="descricao" placeholder="Descrição da sua tarefa aqui..." required
                    name="descricao" rows="6" cols="40"></textarea><br>

                <label for="dia">Data da Tarefa: </label>
                <input type="date" id="dia" class="dia" name="dia" required><br>

                <label for="prioridade" class="tituloPrioridade">A prioridade da sua Tarefa é:</label>
                <select id="prioridade" class="prioridade" required>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select><br>

                <label for="status">Status da tarefa: </label>
                <select name="status" class="status" id="status" required>
                    <option value="Pendente">Pendente</option>
                    <option value="Concluída">Concluída</option>
                </select><br>

                <div class="adicionar">
                    <button type="submit" class="adicionarTarefa">Adicionar Tarefa</button>
                </div>
            </form>
        </div>
    </div>

    <div class="tituloHistorico">
        <h2>Tarefas...</h2>
        <div id="PainelHistorico" class="PainelHistorico">
            <div id="HistoricoTarefas"></div>
        </div>
    </div>
    <section id="resultado" aria-live="polite"></section>

    <footer>
        <p>copyright - todos os direitos reservados</p>
    </footer>

    <script src="assets/js/funções.js"></script>
    </script>
</body>

</html>
